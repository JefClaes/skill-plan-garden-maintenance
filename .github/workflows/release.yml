name: Release skill

# Build the packaged skill on a version tag, attach a build-provenance
# attestation (binding the artifact to this commit + workflow run), and
# publish it on the GitHub release.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write       # create the release and upload the asset
  id-token: write       # OIDC identity for the attestation
  attestations: write   # write the provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the tagged source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Package the skill
        run: ./package-skill.sh

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/garden-maintenance-planner.zip

      - name: Publish the release with the packaged skill
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/garden-maintenance-planner.zip \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
